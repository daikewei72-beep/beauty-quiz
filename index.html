<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美女調查</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 8px solid #e91e63; }
        h2 { color: #e91e63; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        
        /* 📸 最上方大圖的樣式 */
        .banner-img { width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
        
        select { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #f8bbd0; border-radius: 6px; font-size: 16px; color: #333; background-color: #fff; }
        select:focus { outline: none; border-color: #e91e63; }
        button { background-color: #e91e63; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #c2185b; }
    </style>
</head>
<body>

<div class="card">
    <h2>📢 人氣票選調查</h2>
    <p>TAIWAN'S MOST BEAUTIFUL</p>
    
    <!-- 📸 這行就是放在問題上方的大圖片 -->
    <img src="banner.jpg" alt="活動橫幅" class="banner-img">
    
    <!-- 🔴 請將下面的 action 網址換成你的個人表單 formResponse 網址 -->
    <form action="https://docs.google.com/forms/d/e/1FAIpQLSdICTY6n0JcQDR8Yh0b28b1-A0expsTrCCmwoRsgUbhlyiy3Q/formResponse" method="POST">
        
        <label for="beautySelect" style="font-weight: bold; color: #333;">請選出你心中臺灣最美的女子：</label>
        
        <!-- 🔴 請將下面的 name 換成你的 entry.數字 -->
        <select id="beautySelect" name="entry.1668065008" required>
            <option value="" disabled selected>-- 請選擇 --</option>
            <option value="欣吾老師">欣吾老師</option>
            <option value="Delia">Delia</option>
            <option value="蔡欣吾">蔡欣吾</option>
            <option value="艾樺的姐姐">艾樺的姐姐</option>
        </select>
        
        <button type="submit">送出神聖的一票</button>
    </form>
</div>

</body>
</html>
